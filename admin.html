<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم الإدارة | منتجات زراعية - الزرهوني</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Overlay for Login view */
    #login-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      padding: 2.5rem;
      text-align: center;
    }

    #dashboard-view {
      display: none;
      /* Hidden until authenticated */
    }

    /* Make text readable in tables */
    .product-thumbnail img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--surface-border);
    }
  </style>
</head>

<body>

  <!-- ADMIN LOGIN VIEW -->
  <div id="login-view" class="container">
    <div class="login-box glass-panel animate-fade-in">
      <h1 style="margin-bottom: 2rem;">دخول لمدير النظام</h1>

      <form id="loginForm">
        <div class="form-group" style="text-align: right;">
          <label for="username">اسم المستخدم</label>
          <input type="text" id="username" placeholder="أدخل اسم المستخدم" required>
        </div>
        <div class="form-group" style="text-align: right;">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
        </div>
        <div id="login-error"
          style="color: var(--danger-color); font-size: 0.875rem; margin-bottom: 1rem; display: none;">
          بيانات الدخول غير صحيحة
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%">دخول</button>
      </form>
      <div style="margin-top: 1.5rem">
        <a href="index.html" class="btn btn-ghost" style="width: 100%">العودة للمتجر</a>
      </div>
    </div>
  </div>

  <!-- ADMIN DASHBOARD VIEW -->
  <div id="dashboard-view">
    <header>
      <div class="container">
        <nav>
          <a href="index.html" class="logo text-gradient" target="_blank">مدير النظام</a>
          <div style="display: flex; gap: 1rem; align-items: center;">
            <span class="hide-on-mobile" style="color: var(--text-secondary);">أهلاً بك أيها المدير</span>
            <button id="logoutBtn" class="btn btn-ghost">خروج</button>
          </div>
        </nav>
      </div>
    </header>

    <div class="container admin-layout">
      <aside class="sidebar">
        <ul style="list-style: none;">
          <li style="margin-bottom: 1rem;">
            <a href="#" style="color: var(--accent-color); font-weight: 500; text-decoration: none;">مدير المنتجات</a>
          </li>
          <li style="margin-bottom: 1rem;">
            <a href="index.html" style="color: var(--text-secondary); text-decoration: none;">معاينة المتجر</a>
          </li>
        </ul>
      </aside>

      <main class="main-content glass-panel"
        style="margin-top: 2rem; margin-bottom: 2rem; border-top: 1px solid var(--surface-border);">
        <div class="admin-header-actions">
          <h2>إدارة المنتجات</h2>
          <button id="addProductBtn" class="btn btn-primary">+ إضافة منتج جديد</button>
        </div>

        <div style="overflow-x: auto;">
          <table>
            <thead>
              <tr>
                <th>الصورة</th>
                <th>الإسم</th>
                <th>السعر</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody id="admin-products-table">
              <!-- Products injected by admin.js -->
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <!-- PRODUCT MODAL (Add/Edit) -->
  <div id="productModal" class="modal-backdrop">
    <div class="modal glass-panel" style="padding: 2rem;">
      <div class="modal-header">
        <h2 id="modalTitle">إضافة منتج</h2>
        <button class="close-btn" id="closeModalBtn">&times;</button>
      </div>

      <form id="productForm">
        <input type="hidden" id="productId">

        <div class="form-group" style="text-align: right;">
          <label for="productName">اسم المنتج</label>
          <input type="text" id="productName" required>
        </div>

        <div class="form-group" style="text-align: right;">
          <label for="productPrice">السعر (درهم)</label>
          <input type="number" step="0.01" id="productPrice" required>
        </div>

        <div class="form-group" style="text-align: right;">
          <label for="productImage">رابط الصورة</label>
          <input type="url" id="productImage" placeholder="https://..." required>
        </div>

        <div class="form-group" style="text-align: right;">
          <label for="productDesc">الوصف</label>
          <textarea id="productDesc" rows="3" required></textarea>
        </div>

        <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
          <button type="button" class="btn btn-ghost" id="cancelModalBtn">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ المنتج</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/store.js"></script>
  <script src="js/admin.js"></script>
</body>

</html>
