<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | منتجات الزرهوني</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Overlay for Login view */
    #login-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      padding: 2.5rem;
      text-align: center;
    }

    #dashboard-view {
      display: none;
      /* Hidden until authenticated */
    }

    /* Make text readable in tables */
    .product-thumbnail img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--surface-border);
    }
  </style>
</head>

<body>

  <!-- ADMIN LOGIN VIEW -->
  <div id="login-view" class="container">
    <div class="login-box glass-panel animate-fade-in">
      <h1 style="margin-bottom: 2rem;">Admin Login</h1>

      <form id="loginForm">
        <div class="form-group" style="text-align: left;">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group" style="text-align: left;">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <div id="login-error"
          style="color: var(--danger-color); font-size: 0.875rem; margin-bottom: 1rem; display: none;">
          Invalid credentials
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%">Login</button>
      </form>
      <div style="margin-top: 1.5rem">
        <a href="index.html" class="btn btn-ghost" style="width: 100%">Back to Store</a>
      </div>
    </div>
  </div>

  <!-- ADMIN DASHBOARD VIEW -->
  <div id="dashboard-view">
    <header>
      <div class="container">
        <nav>
          <a href="index.html" class="logo text-gradient" target="_blank">منتجات الزرهوني Admin</a>
          <div>
            <span style="margin-right: 1rem; color: var(--text-secondary);">Welcome, Admin</span>
            <button id="logoutBtn" class="btn btn-ghost">Logout</button>
          </div>
        </nav>
      </div>
    </header>

    <div class="container admin-layout">
      <aside class="sidebar">
        <ul style="list-style: none;">
          <li style="margin-bottom: 1rem;">
            <a href="#" style="color: var(--accent-color); font-weight: 500; text-decoration: none;">Products
              Manager</a>
          </li>
          <li style="margin-bottom: 1rem;">
            <a href="index.html" style="color: var(--text-secondary); text-decoration: none;">View Live Store</a>
          </li>
        </ul>
      </aside>

      <main class="main-content glass-panel"
        style="margin-top: 2rem; margin-bottom: 2rem; border-top: 1px solid var(--surface-border);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
          <h2>Manage Products</h2>
          <button id="addProductBtn" class="btn btn-primary">+ Add New Product</button>
        </div>

        <div style="overflow-x: auto;">
          <table>
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="admin-products-table">
              <!-- Products injected by admin.js -->
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <!-- PRODUCT MODAL (Add/Edit) -->
  <div id="productModal" class="modal-backdrop">
    <div class="modal glass-panel" style="padding: 2rem;">
      <div class="modal-header">
        <h2 id="modalTitle">Add Product</h2>
        <button class="close-btn" id="closeModalBtn">&times;</button>
      </div>

      <form id="productForm">
        <input type="hidden" id="productId">

        <div class="form-group">
          <label for="productName">Product Name</label>
          <input type="text" id="productName" required>
        </div>

        <div class="form-group">
          <label for="productPrice">Price ($)</label>
          <input type="number" step="0.01" id="productPrice" required>
        </div>

        <div class="form-group">
          <label for="productImage">Image URL</label>
          <input type="url" id="productImage" placeholder="https://..." required>
        </div>

        <div class="form-group">
          <label for="productDesc">Description</label>
          <textarea id="productDesc" rows="3" required></textarea>
        </div>

        <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
          <button type="button" class="btn btn-ghost" id="cancelModalBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/admin.js"></script>
</body>

</html>
