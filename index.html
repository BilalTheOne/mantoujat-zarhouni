<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="متجر زراعي - اكتشف تشكيلتنا الواسعة من المنتجات والمعدات الفلاحية عالية الجودة.">
  <title>منتجات زراعية - الزرهوني | Agrico Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header>
    <div class="container">
      <nav>
        <a href="index.html" class="logo text-gradient">منتجات الزرهوني</a>
        <a href="admin.html" class="btn btn-ghost">بوابة الإدارة</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero" style="text-align: center; padding: 4rem 0 2rem;">
      <h1 class="animate-fade-in">منتجات الزرهوني</h1>
      <p class="text-secondary animate-fade-in"
        style="animation-delay: 0.1s; font-size: 1.125rem; max-width: 600px; margin: 1rem auto;">
        فلاحية عالية الجودة
      </p>
    </section>

    <div id="products-container" class="product-grid animate-fade-in" style="animation-delay: 0.2s;">
      <!-- Products will be injected here by app.js -->
    </div>
  </main>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
